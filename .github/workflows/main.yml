name: CI/CD OpenTofu & OPA

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  plan-and-evaluate:
    name: Plan IaC & OPA Policy Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout IaC Repository
        uses: actions/checkout@v4

      - name: Checkout OPA Policies Repository
        uses: actions/checkout@v4
        with:
          repository: 'RicNuva18/opa-policies-workshop' 
          path: 'opa-policies'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu-version: latest

      - name: OpenTofu Init & Plan
        id: plan
        run: |
          tofu init \
            -backend-config="bucket=${{ secrets.BACKEND_BUCKET }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
          
          tofu plan -out=tfplan.binary
          tofu show -json tfplan.binary > tfplan.json

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Evaluate OPA Policies
        run: |
          echo "Iniciando evaluación de seguridad con OPA..."
          
          HAS_ERRORS=0
          
          while IFS= read -r POLICY_PATH; do
            FILENAME=$(basename "$POLICY_PATH")
            echo "----------------------------------------"
            echo "Evaluando política: $FILENAME"
            
            PACKAGE_NAME=$(awk '/^package/ {print $2; exit}' "$POLICY_PATH" | tr -d '\r')
            
            OPA_QUERY="data.${PACKAGE_NAME}.main"
            echo "Ruta de consulta: $OPA_QUERY"
            
            RESULT=$(opa eval --format pretty --data "$POLICY_PATH" --input tfplan.json "$OPA_QUERY")
            
            if [ "$RESULT" = "true" ]; then
              echo "PASS: Cumple con $FILENAME"
            else
              echo "FAIL: Violación detectada en $FILENAME (Resultado: $RESULT)"
              HAS_ERRORS=1
            fi
          done < <(find opa-policies -type f -name "*.rego")
          
          echo "----------------------------------------"
          
          if [ $HAS_ERRORS -eq 1 ]; then
            echo "Pipeline bloqueado: El plan de infraestructura no cumple con las políticas de seguridad."
            exit 1
          else
            echo "Todas las políticas pasaron exitosamente. Plan seguro."
          fi

  deploy:
    name: Apply Infrastructure
    needs: plan-and-evaluate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout IaC Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu-version: latest

      - name: OpenTofu Init & Apply
        run: |
          tofu init \
            -backend-config="bucket=${{ secrets.BACKEND_BUCKET }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
          tofu apply -auto-approve